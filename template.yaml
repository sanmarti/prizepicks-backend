AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: PrizePicks Backend - eu-west-3

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    MemorySize: 256
    Timeout: 15
    Layers: [!Ref CommonLayer]
    Environment:
      Variables:
        NODE_ENV: production
        AWS_ACCOUNT_REGION: eu-west-3
    # Each function ships the whole repo root so ../../shared/* resolves correctly
    CodeUri: ./

Parameters:
  Environment:
    Type: String
    Default: prod

Resources:

  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: prizepicks-common
      ContentUri: layers/common/
      CompatibleRuntimes: [nodejs20.x]
      CompatibleArchitectures: [arm64]
    Metadata:
      BuildMethod: nodejs20.x

  PrizePicksApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowHeaders: ["Authorization", "Content-Type"]
        AllowMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]

  # --- AUTH (public) ---
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-auth-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/auth/handler.handler
      Events:
        Register:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /auth/register
            Method: POST
        Login:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /auth/login
            Method: POST

  # --- LEAGUES ---
  LeaguesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-leagues-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/leagues/handler.handler
      Events:
        ListLeagues:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /leagues
            Method: GET
        CreateLeague:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /leagues
            Method: POST
        GetLeague:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /leagues/{id}
            Method: GET
        UpdateLeague:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /leagues/{id}
            Method: PUT
        JoinLeague:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /leagues/join/{code}
            Method: POST
        LeagueStandings:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /leagues/{id}/standings
            Method: GET

  # --- GAMEWEEKS ---
  GameweeksFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-gameweeks-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/gameweeks/handler.handler
      Events:
        ListGameweeks:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /gameweeks
            Method: GET
        GetGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /gameweeks/{id}
            Method: GET

  # --- PICKS ---
  PicksFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-picks-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/picks/handler.handler
      Events:
        SubmitPicks:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /picks
            Method: POST
        GetPicks:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /picks/{gameweekId}
            Method: GET

  # --- MATCHUPS ---
  MatchupsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-matchups-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/matchups/handler.handler
      Events:
        GetMatchup:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /matchups/{id}
            Method: GET

  # --- SCORING ---
  ScoringFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-scoring-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/scoring/handler.handler
      Events:
        Resolve:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /scoring/resolve
            Method: POST

  # --- ENERGY ---
  EnergyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-energy-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/energy/handler.handler
      Events:
        GetEnergy:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /energy
            Method: GET
        BuyEnergy:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /energy/buy
            Method: POST

  # --- ADMIN ---
  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-admin-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/admin/handler.handler
      Events:
        CreateGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/gameweek
            Method: POST
        PublishGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/publish
            Method: POST
        ImportFixtures:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/fixtures
            Method: GET

Outputs:
  ApiUrl:
    Value: !Sub "https://${PrizePicksApi}.execute-api.eu-west-3.amazonaws.com/prod"
    Export:
      Name: PrizePicksApiUrl
