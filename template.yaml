AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: PrizePicks Backend - eu-west-3

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    MemorySize: 256
    Timeout: 15
    Layers: [!Ref CommonLayer]
    Environment:
      Variables:
        NODE_ENV: production
        AWS_ACCOUNT_REGION: eu-west-3
    # Each function ships the whole repo root so ../../shared/* resolves correctly
    CodeUri: ./

Parameters:
  Environment:
    Type: String
    Default: prod

Resources:

  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: prizepicks-common
      ContentUri: layers/common/
      CompatibleRuntimes: [nodejs20.x]
      CompatibleArchitectures: [arm64]
    Metadata:
      BuildMethod: nodejs20.x

  PublicApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowHeaders: ["Content-Type"]
        AllowMethods: ["GET", "OPTIONS"]

  PrizePicksApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowHeaders: ["Authorization", "Content-Type"]
        AllowMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]

  # --- AUTH (public) ---
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-auth-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/auth/handler.handler
      Events:
        Register:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /auth/register
            Method: POST
        Login:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /auth/login
            Method: POST

  # --- LEAGUES ---
  LeaguesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-leagues-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/leagues/handler.handler
      Events:
        ListLeagues:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /leagues
            Method: GET
        CreateLeague:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /leagues
            Method: POST
        GetLeague:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /leagues/{id}
            Method: GET
        UpdateLeague:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /leagues/{id}
            Method: PUT
        JoinLeague:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /leagues/join/{code}
            Method: POST
        LeagueStandings:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /leagues/{id}/standings
            Method: GET

  # --- GAMEWEEKS ---
  GameweeksFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-gameweeks-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/gameweeks/handler.handler
      Events:
        ListGameweeks:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /gameweeks
            Method: GET
        GetGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /gameweeks/{id}
            Method: GET

  # --- PICKS ---
  PicksFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-picks-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/picks/handler.handler
      Events:
        SubmitPicks:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /picks
            Method: POST
        GetPicks:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /picks/{gameweekId}
            Method: GET

  # --- MATCHUPS ---
  MatchupsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-matchups-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/matchups/handler.handler
      Events:
        GetMatchup:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /matchups/{id}
            Method: GET

  # --- SCORING ---
  ScoringFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-scoring-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/scoring/handler.handler
      Events:
        Resolve:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /scoring/resolve
            Method: POST

  # --- ENERGY ---
  EnergyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-energy-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/energy/handler.handler
      Events:
        GetEnergy:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /energy
            Method: GET
        BuyEnergy:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /energy/buy
            Method: POST

  # --- USERS / PROFILE ---
  UsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-users-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/users/handler.handler
      Events:
        GetProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /users/me
            Method: GET
        UpdateProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /users/me
            Method: PUT
        ChangePassword:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /users/me/password
            Method: PUT

  # --- ADMIN ---
  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-admin-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/admin/handler.handler
      Timeout: 60
      Events:
        CreateGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/gameweek
            Method: POST
        GetGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/gameweek/{id}
            Method: GET
        UpdateGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/gameweek/{id}
            Method: PUT
        PublishGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/publish
            Method: POST
        ImportFixtures:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/fixtures
            Method: GET
        ListUsers:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/users
            Method: GET
        GetUserDetail:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/users/{id}
            Method: GET
        ListLeagues:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/leagues
            Method: GET
        GetStats:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/stats
            Method: GET
        GetDashboard:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/dashboard
            Method: GET
        GetOdds:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/odds
            Method: GET
        ListCompetitions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/competitions
            Method: GET
        CreateCompetition:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/competitions
            Method: POST
        UpdateCompetition:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/competitions/{id}
            Method: PUT
        DeleteCompetition:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/competitions/{id}
            Method: DELETE
        GetCompetitionCalendar:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/competitions/{id}/calendar
            Method: GET
        GetCompetitionGameweeks:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/competitions/{id}/gameweeks
            Method: GET
        GetCompetitionStandings:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/competitions/{id}/standings
            Method: GET
        GetFixtureDetails:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/fixtures/{fixtureId}/details
            Method: GET
        GetAvailableFixtures:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/fixtures/available
            Method: GET
        ImportFixturesByRange:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/fixtures/import-range
            Method: POST
        BrowseCompetitions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/competitions/browse
            Method: GET
        ImportCompetitionFromApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/competitions/import
            Method: POST
        RefreshFixtureResults:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/fixtures/refresh-results
            Method: POST
        # 6 to Glory – Divisions
        ListDivisions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/divisions
            Method: GET
        CreateDivision:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/divisions
            Method: POST
        UpdateDivision:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/divisions/{id}
            Method: PUT
        GetDivisionUsers:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/divisions/{id}/users
            Method: GET
        # 6 to Glory – Sprints
        ListSprints:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/sprints
            Method: GET
        CreateSprint:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/sprints
            Method: POST
        GetSprint:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/sprints/{id}
            Method: GET
        UpdateSprint:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/sprints/{id}
            Method: PUT
        AddSprintGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/sprints/{id}/gameweeks
            Method: POST
        RemoveSprintGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/sprints/{id}/gameweeks/{gwId}
            Method: DELETE
        SettleSprint:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/sprints/{id}/settle
            Method: POST
        LockGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/gameweeks/{id}/lock
            Method: POST
        ResolveGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/gameweeks/{id}/resolve
            Method: POST
        UnlockGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/gameweeks/{id}/unlock
            Method: POST
        ActivateSprint:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/sprints/{id}/activate
            Method: POST
        AdminRankings:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/rankings
            Method: GET
        AdminEnergyPacksList:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/energy-packs
            Method: GET
        AdminEnergyPacksCreate:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/energy-packs
            Method: POST
        AdminEnergyPacksUpdate:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/energy-packs/{id}
            Method: PUT
        AdminEnergyPacksDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /admin/energy-packs/{id}
            Method: DELETE
        ListCompetitionsPublic:
          Type: HttpApi
          Properties:
            ApiId: !Ref PublicApi
            Path: /competitions
            Method: GET
        PublicScores:
          Type: HttpApi
          Properties:
            ApiId: !Ref PublicApi
            Path: /scores
            Method: GET
        PublicGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PublicApi
            Path: /public/gameweek
            Method: GET
        Scores:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /scores
            Method: GET

  # --- LIFECYCLE (scheduled automation) ---
  LifecycleFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-lifecycle-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/lifecycle/handler.handler
      Timeout: 120
      Events:
        LifecycleCronV2:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Enabled: true

  # --- 6 TO GLORY (user-facing) ---
  GloryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prizepicks-glory-prod
      Role: arn:aws:iam::696715200075:role/prizepicks-role-lambda-prod
      Handler: functions/glory/handler.handler
      Events:
        GloryStatus:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/status
            Method: GET
        GloryCurrentGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/gameweek
            Method: GET
        GloryGetGameweek:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/gameweek/{id}
            Method: GET
        GlorySubmitPicks:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/gameweek/{id}/picks
            Method: POST
        GloryGetPicks:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/gameweek/{id}/picks
            Method: GET
        GloryProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/profile
            Method: GET
        GloryLeaderboard:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/leaderboard
            Method: GET
        GlorySprints:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/sprints
            Method: GET
        GloryDivisions:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/divisions
            Method: GET
        GloryMySprintsMy:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/sprints/my
            Method: GET
        GlorySprintDetail:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/sprints/{id}
            Method: GET
        GloryCommunityPicks:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/gameweek/{id}/community
            Method: GET
        GloryPublicProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/users/{id}
            Method: GET
        GloryFixtureStats:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/fixtures/{id}/stats
            Method: GET
        GloryFixtureForm:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/fixtures/{id}/form
            Method: GET
        GloryGameweekLive:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/gameweek/{id}/live
            Method: GET
        GloryEnergyPacksList:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/energy-packs
            Method: GET
        GloryEnergyPacksPurchase:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/energy-packs/{id}/purchase
            Method: POST
        GloryPurchaseHistory:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrizePicksApi
            Path: /glory/purchase-history
            Method: GET

Outputs:
  ApiUrl:
    Value: !Sub "https://${PrizePicksApi}.execute-api.eu-west-3.amazonaws.com/prod"
    Export:
      Name: PrizePicksApiUrl
  PublicApiUrl:
    Value: !Sub "https://${PublicApi}.execute-api.eu-west-3.amazonaws.com/prod"
    Export:
      Name: PrizePicksPublicApiUrl
